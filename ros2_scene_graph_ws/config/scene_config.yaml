    start_position: [1.0, 1.0, 0.0]
    speed_mps: 1.2
    path_mode: "stochastic"
    stochastic_seed: 42
    waypoints:
      - {object_id: "obj_001", dwell_sec: 5.0, probability: 0.30}
      - {object_id: "obj_006", dwell_sec: 8.0, probability: 0.25}
      - {object_id: "obj_011", dwell_sec: 5.0, probability: 0.20}
      - {object_id: "obj_014", dwell_sec: 4.0, probability: 0.15}
      - {object_id: "obj_019", dwell_sec: 2.0, probability: 0.10}

  - id: "agent_secondary"
    start_position: [8.0, 6.5, 0.0]
    speed_mps: 2.5
    path_mode: "deterministic"
    waypoints:
      - {object_id: "obj_016", dwell_sec: 2.0}
      - {object_id: "obj_018", dwell_sec: 2.0}
      - {object_id: "obj_017", dwell_sec: 2.0}
